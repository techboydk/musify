<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="musify/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <title>Musify</title>
</head>

<body>

    <audio src="" id="audio-source"></audio>
    <!-- home section -->
    <section class="home-section">
        <!-- carousel -->
        <div class="carousel">
            <img src="/musify/assets/images/cover 1-min.png" class="active" alt="">
            <img src="/musify/assets/images/cover 2-min.png" alt="">
            <img src="/musify/assets/images/cover 3-min.png" alt="">
            <img src="/musify/assets/images/cover 4-min.png" alt="">
            <img src="/musify/assets/images/cover 5-min.png" alt="">
        </div>
        <!-- playlist  -->
        <h1 class="heading">Recently played</h1>
        <div class="playlists-group">
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 9-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">top international</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 2-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">BTS collection</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 5-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">bollywood hits</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 10-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">top 50</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 11-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">arijit singh</p>
            </div>
        </div>
        <h1 class="heading">based on your listening</h1>
        <div class="playlists-group">
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 8-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">top international</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 1-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">BTS collection</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 4-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">bollywood hits</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 13-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">top 50</p>
            </div>
            <div class="playlist-card">
                <img src="/musify/assets/images/cover 7-min.png" class="playlist-card-img" alt="">
                <p class="playlist-card-name">arijit singh</p>
            </div>
        </div>


    </section>
    <!-- music player section -->
    <section class="music-player-section">
        <img src="/musify/assets/images/back.png" class="back-btn icon hide" alt="">
        <img src="/musify/assets/images/nav.png" alt="" class="nav-btn icon hide">

        <h1 class="current-song-name">song 1</h1>
        <p class="artist-name hide">artist 1</p>

        <img src="/musify/assets/images/cover 1-min.png" class="cover hide" alt="">

        <div class="seek-bar-container">
            <input type="range" class="music-seek-bar" value="0">
            <p class="current-time hide">00 : 00</p>
            <p class="duration hide">00 : 00</p>
        </div>
        <div class="controls">
            <span class="fas fa-redo"></span>
            <div class="main">
                <i class="fas fa-backward active"></i>
                <i class="fas fa-play active"></i>
                <i class="fas fa-pause"></i>
                <i class="fas fa-forward active"></i>
            </div>
            <input type="range" class="volume-slider" max="1" value="0" step="0.1">
            <span class="fas fa-volume-up"></span>
        </div>
    </section>
    <!-- playlist section -->
    <section class="playlist">
        <img src="/musify/assets/images/back-min.png" class="back-btn icon" alt="">

        <h1 class="title">playlist</h1>

        <div class="queue">
            <div class="queue-cover">
                <img src="/musify/assets/images/cover 1-min.png" alt="">
                <i class="fas fa-pause"></i>
            </div>
            <p class="name">song 1</p>
        </div>
        <div class="queue">
            <div class="queue-cover">
                <img src="/musify/assets/images/cover 2-min.png" alt="">
                <i class="fas fa-pause"></i>
            </div>
            <p class="name">song 2</p>
        </div>
        <div class="queue">
            <div class="queue-cover">
                <img src="/musify/assets/images/cover 3-min.png" alt="">
                <i class="fas fa-pause"></i>
            </div>
            <p class="name">song 3</p>
        </div>
        <div class="queue">
            <div class="queue-cover">
                <img src="/musify/assets/images/cover 4-min.png" alt="">
                <i class="fas fa-pause"></i>
            </div>
            <p class="name">song 4</p>
        </div>
        <div class="queue">
            <div class="queue-cover">
                <img src="/musify/assets/images/cover 5-min.png" alt="">
                <i class="fas fa-pause"></i>
            </div>
            <p class="name">song 5</p>
        </div>
        <div class="queue">
            <div class="queue-cover">
                <img src="/musify/assets/images/cover 6-min.png" alt="">
                <i class="fas fa-pause"></i>
            </div>
            <p class="name">song 6</p>
        </div>
    </section>
</body>
<script src="/musify/data.js"></script>
<script src="/musify/index.js"></script>

</html>
